<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>激活邮箱 - {aspbbs:guestConfig.SiteName} </title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="keywords" content="{aspbbs:guestConfig.SiteKeyWords}">
  <meta name="description" content="{aspbbs:guestConfig.SiteDesc}">
{aspbbs:template src=common/link}
</head>
<body>

{aspbbs:template src=common/header_user}

<div class="layui-container fly-marginTop fly-user-main">
  {aspbbs:template src=common/user-nav}
  
  
  <div class="fly-panel fly-panel-user" pad20>
    <div class="layui-tab layui-tab-brief" lay-filter="user">
      <ul class="layui-tab-title">
        <li class="layui-this">
          激活邮箱
        </li>
      </ul>
     <div class="layui-tab-content" id="LAY_ucm" style="padding: 20px 0;"> 
      <ul class="layui-form layui-text"> 
       <li class="layui-form-li"> <label for="activate">您的邮箱：</label> <span class="layui-form-text">{aspbbs:admin.Email} <em style="color:#999;">（{aspbbs:info}）</em> </span> </li> 
       <li class="layui-form-li" style="margin-top: 20px;"> 
        <blockquote class="layui-elem-quote" style="line-height: 32px;">
          {aspbbs:msg}
        </blockquote> </li> 
      </ul> 
     </div> 
    </div>
  </div>
  
</div>

{aspbbs:template src=self/footer}

</body>
</html>
