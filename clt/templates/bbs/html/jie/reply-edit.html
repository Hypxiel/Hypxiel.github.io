<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>编辑回帖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="keywords" content="">
  <meta name="description" content="">
{aspbbs:template src=common/link}
</head>
<body>

{aspbbs:template src=common/header_user}

<div class="layui-container fly-marginTop">
  <div class="fly-panel" pad20 style="padding-top: 5px;">
    <!--<div class="fly-none">没有权限</div>-->
    <div class="layui-form layui-form-pane">
      <div class="layui-tab layui-tab-brief" lay-filter="user">
        <ul class="layui-tab-title">
          <li class="layui-this">编辑回帖</li>
        </ul>
        <div class="layui-form layui-tab-content" id="LAY_ucm" style="padding: 20px 0;">
          <div class="layui-tab-item layui-show">
            <form action="{aspbbs:indexprefix}bbs--Reply_doEdit" method="post">
              <div class="layui-form-item layui-form-text">
                <div class="layui-input-block">
                  <textarea id="L_content" name="Content" required lay-verify="required" placeholder="详细描述" class="layui-textarea" style="height: 260px;">{aspbbs:reply.Content}</textarea>
				  {aspbbs:summernote}
                </div>
              </div>
			  {if: "{aspbbs:guestConfig.ReplyVerify}"="1" AND $_S.IsAdmin<>1 AND NOT checkwap()}
              <div class="layui-form-item">
                <label for="L_vercode" class="layui-form-label">图形码</label>
                <div class="layui-input-inline">
                  <input type="text" id="L_vercode" name="verify" required lay-verify="required" placeholder="请回答后面的验证码" autocomplete="off" class="layui-input">
                </div>
                <div class="layui-form-mid">
                  <span style="color: #c00;">{aspbbs:checkimg}</span>
                </div>
              </div>
			  {end if}
              <div class="layui-form-item">
				<input type="hidden" name="ReplyID" value="{aspbbs:reply.ReplyID}">
				<input type="hidden" name="refer" value='{aspbbs:func:POP_MVC.vars("HTTP_REFERER")}'>
                <button class="layui-btn" lay-filter="*" lay-submit>立即发布</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{aspbbs:template src=self/footer}

</body>
</html>
